<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 접수 완료 | 페어시스</title>
    <meta name="robots" content="noindex">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            max-width: 480px;
            width: 100%;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        .icon {
            width: 72px;
            height: 72px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }
        h1 {
            font-size: 24px;
            color: #222;
            margin-bottom: 12px;
            font-weight: 700;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .info {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            margin: 24px 0;
            font-size: 14px;
            color: #555;
        }
        .btn {
            display: inline-block;
            background: #1a1a1a;
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 24px;
            font-weight: 600;
            font-size: 15px;
        }
        .contact {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #888;
        }
        .contact strong {
            color: #1a1a1a;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✓</div>
        <h1>문의가 접수되었습니다</h1>
        <p>페어시스에 견적 문의 주셔서 감사합니다.</p>
        <p>담당자 확인 후 영업일 기준 1일 이내에 연락드립니다.</p>
        
        <div class="info">
            급한 문의는 아래 전화로 직접 주세요.
        </div>
        
        <div class="contact">
            <strong>02-318-8707</strong><br>
            평일 09:00 - 18:00
        </div>
        
        <a href="/" class="btn">홈으로 돌아가기</a>
    </div>

    <!-- 네이버 전환추적 스크립트 (설치안내 메일 받은 후 여기 자리에 추가) -->
    
</body>
</html>
